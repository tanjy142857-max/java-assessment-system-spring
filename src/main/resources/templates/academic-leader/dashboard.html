<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Leader Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #00796b;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/academic-leader/dashboard">Academic Leader Panel</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-2" sec:authentication="name"></span>
            <a class="nav-link" href="/academic-leader/dashboard">Dashboard</a>
            <a class="nav-link" href="/academic-leader/modules">My Modules</a>
            <a class="nav-link" href="/academic-leader/reports">Reports</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Academic Leader Dashboard</h2>

    <!-- Stat Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card text-white" style="background-color: #00796b;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-white-50">My Modules</h6>
                            <h2 class="card-text" th:text="${myModules}">0</h2>
                        </div>
                        <i class="bi bi-book-fill" style="font-size: 3rem; opacity: 0.3;"></i>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-white border-opacity-25">
                    <a href="/academic-leader/modules" class="text-white text-decoration-none small">View modules <i class="bi bi-arrow-right-short"></i></a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card text-white" style="background-color: #1e8449;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="card-title text-white-50">My Lecturers</h6>
                            <h2 class="card-text" th:text="${myLecturers}">0</h2>
                        </div>
                        <i class="bi bi-people-fill" style="font-size: 3rem; opacity: 0.3;"></i>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-white border-opacity-25">
                    <span class="text-white-50 small">Assigned lecturers</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row g-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header" style="background-color: #00796b; color: white;">
                    <h5 class="mb-0">Quick Links</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <a href="/academic-leader/modules" class="text-decoration-none">
                                <div class="card border text-center p-3 h-100">
                                    <i class="bi bi-book-fill" style="font-size: 2rem; color: #00796b;"></i>
                                    <h6 class="mt-2 text-dark">My Modules</h6>
                                    <small class="text-muted">Manage modules and create classes</small>
                                </div>
                            </a>
                        </div>
                        <div class="col-md-6">
                            <a href="/academic-leader/reports" class="text-decoration-none">
                                <div class="card border text-center p-3 h-100">
                                    <i class="bi bi-bar-chart-fill" style="font-size: 2rem; color: #1e8449;"></i>
                                    <h6 class="mt-2 text-dark">Reports</h6>
                                    <small class="text-muted">View module assessment reports</small>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
