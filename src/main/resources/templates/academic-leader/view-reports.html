<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #00796b;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/academic-leader/dashboard">Academic Leader Panel</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-2" sec:authentication="name"></span>
            <a class="nav-link" href="/academic-leader/dashboard">Dashboard</a>
            <a class="nav-link" href="/academic-leader/modules">My Modules</a>
            <a class="nav-link" href="/academic-leader/reports">Reports</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Module Reports</h2>

    <!-- Module Selection -->
    <div class="card shadow-sm mb-4">
        <div class="card-header" style="background-color: #00796b; color: white;">
            <h5 class="mb-0">Select Module</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/academic-leader/reports}" method="get" class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label for="moduleId" class="form-label">Module</label>
                    <select class="form-select" id="moduleId" name="moduleId" required>
                        <option value="" disabled selected>Select a module to view its report...</option>
                        <option th:each="module : ${modules}"
                                th:value="${module.id}"
                                th:text="${module.moduleCode} + ' - ' + ${module.moduleName}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn text-white w-100" style="background-color: #00796b;">
                        <i class="bi bi-search"></i> View Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Report Output -->
    <div class="card shadow-sm">
        <div class="card-header" style="background-color: #1e8449; color: white;">
            <h5 class="mb-0">Report</h5>
        </div>
        <div class="card-body">
            <div th:if="${report == null}" class="text-center text-muted py-5">
                <i class="bi bi-file-earmark-bar-graph" style="font-size: 3rem;"></i>
                <p class="mt-3">Select a module above to view its assessment report.</p>
            </div>
            <pre th:if="${report != null}" class="bg-light p-4 rounded border"
                 style="max-height: 600px; overflow-y: auto; white-space: pre-wrap;"
                 th:text="${report}"></pre>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
