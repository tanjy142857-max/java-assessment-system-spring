<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #00796b;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/academic-leader/dashboard">Academic Leader Panel</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-2" sec:authentication="name"></span>
            <a class="nav-link" href="/academic-leader/dashboard">Dashboard</a>
            <a class="nav-link" href="/academic-leader/modules">My Modules</a>
            <a class="nav-link" href="/academic-leader/reports">Reports</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">My Modules</h2>

    <!-- Modules Table -->
    <div class="card shadow-sm mb-4">
        <div class="card-header" style="background-color: #00796b; color: white;">
            <h5 class="mb-0">Modules</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(modules)}" class="text-center text-muted py-3">
                <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                <p class="mt-2">No modules available.</p>
            </div>
            <table th:if="${!#lists.isEmpty(modules)}" class="table table-striped table-hover">
                <thead style="background-color: #00796b; color: white;">
                    <tr>
                        <th>ID</th>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="module : ${modules}">
                        <td th:text="${module.id}">1</td>
                        <td th:text="${module.moduleCode}">MOD001</td>
                        <td th:text="${module.moduleName}">Module Name</td>
                        <td th:text="${module.description}">Description</td>
                        <td>
                            <form th:action="@{'/academic-leader/modules/delete/' + ${module.id}}" method="post"
                                  onsubmit="return confirm('Delete this module?');" class="d-inline">
                                <button class="btn btn-sm btn-outline-danger" type="submit">
                                    <i class="bi bi-trash-fill"></i> Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Module Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header" style="background-color: #1e8449; color: white;">
            <h5 class="mb-0">Add Module</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/academic-leader/modules/add}" method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="moduleCode" class="form-label">Module Code</label>
                        <input type="text" class="form-control" id="moduleCode" name="moduleCode"
                               placeholder="e.g. CT050-3-2" required>
                    </div>
                    <div class="col-md-4">
                        <label for="moduleName" class="form-label">Module Name</label>
                        <input type="text" class="form-control" id="moduleName" name="moduleName"
                               placeholder="Module Name" required>
                    </div>
                    <div class="col-md-4">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" name="description"
                               placeholder="Brief description">
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn text-white" style="background-color: #00796b;">
                        <i class="bi bi-plus-circle-fill"></i> Add Module
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Class Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header" style="background-color: #21618c; color: white;">
            <h5 class="mb-0">Create Class</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/academic-leader/modules/create-class}" method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="moduleId" class="form-label">Module</label>
                        <select class="form-select" id="moduleId" name="moduleId" required>
                            <option value="" disabled selected>Select a module...</option>
                            <option th:each="module : ${modules}"
                                    th:value="${module.id}"
                                    th:text="${module.moduleCode} + ' - ' + ${module.moduleName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="lecturerId" class="form-label">Lecturer</label>
                        <select class="form-select" id="lecturerId" name="lecturerId" required>
                            <option value="" disabled selected>Select a lecturer...</option>
                            <option th:each="lecturer : ${lecturers}"
                                    th:value="${lecturer.id}"
                                    th:text="${lecturer.fullName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="semester" class="form-label">Semester</label>
                        <input type="text" class="form-control" id="semester" name="semester"
                               placeholder="e.g. 2026-S1" required>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn text-white" style="background-color: #21618c;">
                        <i class="bi bi-plus-circle-fill"></i> Create Class
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
