<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1976d2;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/student/dashboard">Student Portal</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-2" sec:authentication="name"></span>
            <a class="nav-link" href="/student/dashboard">Dashboard</a>
            <a class="nav-link" href="/student/classes">Class Registration</a>
            <a class="nav-link" href="/student/submissions">Submit Assignments</a>
            <a class="nav-link" href="/student/results">Results &amp; Feedback</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Class Registration</h2>
    <p class="text-muted">Browse and register for available classes.</p>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="moduleFilter" class="form-label">Filter by Module</label>
            <select id="moduleFilter" class="form-select">
                <option value="">All Modules</option>
                <option th:each="module : ${modules}" th:value="${module.id}" th:text="${module.name}">Module</option>
            </select>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Class Name</th>
                <th>Module</th>
                <th>Semester</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cls : ${allClasses}">
                <td th:text="${cls.name}">Class Name</td>
                <td th:text="${modules != null ? modules[cls.moduleId] : cls.moduleId}">Module</td>
                <td th:text="${cls.semester}">Semester</td>
                <td>
                    <a th:if="${!cls.registered}" th:href="@{/student/classes/register/{id}(id=${cls.id})}"
                       class="btn btn-sm btn-primary">Register</a>
                    <a th:if="${cls.registered}" th:href="@{/student/classes/unregister/{id}(id=${cls.id})}"
                       class="btn btn-sm btn-outline-danger">Unregister</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(allClasses)}" class="alert alert-info">
        No classes are currently available.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
