<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1976d2;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/student/dashboard">Student Portal</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text text-white me-2" sec:authentication="name"></span>
            <a class="nav-link" href="/student/dashboard">Dashboard</a>
            <a class="nav-link" href="/student/classes">Class Registration</a>
            <a class="nav-link" href="/student/submissions">Submit Assignments</a>
            <a class="nav-link" href="/student/results">Results &amp; Feedback</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col">
            <h2>Welcome, <span sec:authentication="name">Student</span></h2>
            <p class="text-muted">Here is your academic overview.</p>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card border-primary">
                <div class="card-body text-center">
                    <h5 class="card-title text-primary">Current GPA</h5>
                    <p class="display-4" th:text="${gpa}">0.00</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-success">
                <div class="card-body text-center">
                    <h5 class="card-title text-success">Grades Received</h5>
                    <p class="display-4" th:text="${gradesCount}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <h4>Quick Links</h4>
            <div class="list-group">
                <a href="/student/classes" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    Class Registration
                    <span class="badge bg-primary rounded-pill">&rarr;</span>
                </a>
                <a href="/student/submissions" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    Submit Assignments
                    <span class="badge bg-primary rounded-pill">&rarr;</span>
                </a>
                <a href="/student/results" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    Results &amp; Feedback
                    <span class="badge bg-primary rounded-pill">&rarr;</span>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
